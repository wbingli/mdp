<!DOCTYPE html>
<html lang="en" data-color-mode="auto" data-light-theme="light" data-dark-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mdp — Markdown Preview Server</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2328;
            --text-secondary: #656d76;
            --border: #d0d7de;
            --header-bg: #f6f8fa;
            --link: #0969da;
            --hover-bg: #f6f8fa;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --text: #e6edf3;
                --text-secondary: #8b949e;
                --border: #30363d;
                --header-bg: #161b22;
                --link: #58a6ff;
                --hover-bg: #161b22;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        .header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 24px;
            text-align: center;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }
        .container {
            max-width: 700px;
            margin: 32px auto;
            padding: 0 24px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .empty {
            color: var(--text-secondary);
            font-size: 14px;
            font-style: italic;
        }
        .file-list { list-style: none; }
        .file-list li {
            border-bottom: 1px solid var(--border);
        }
        .file-list li:first-child {
            border-top: 1px solid var(--border);
        }
        .file-list a {
            display: block;
            padding: 10px 12px;
            color: var(--link);
            text-decoration: none;
            font-size: 14px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
        }
        .file-list a:hover { background: var(--hover-bg); }
        .usage {
            margin-top: 32px;
            padding: 16px;
            background: var(--header-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>mdp</h1>
        <p>Markdown Preview Server</p>
    </div>
    <div class="container">
        <div class="section-title">Recent Previews</div>
        {{if .Recents}}
        <ul class="file-list">
            {{range .Recents}}
            <li><a href="{{.Path}}">{{.Path}}</a></li>
            {{end}}
        </ul>
        {{else}}
        <p class="empty">No files previewed yet. Use <code>mdp open &lt;file&gt;</code> to get started.</p>
        {{end}}
        <div class="usage">
            $ mdp open README.md
        </div>
    </div>
</body>
</html>
