<!DOCTYPE html>
<html lang="en" data-color-mode="auto" data-light-theme="light" data-dark-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} — mdp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --border: #d0d7de;
            --header-bg: #f6f8fa;
            --header-text: #1f2328;
            --path-text: #656d76;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --border: #30363d;
                --header-bg: #161b22;
                --header-text: #e6edf3;
                --path-text: #8b949e;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        .header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--header-text);
        }
        .header .path {
            font-size: 12px;
            color: var(--path-text);
            margin-top: 2px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .markdown-body {
            font-size: 16px;
        }
        .reload-indicator {
            position: fixed;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .reload-indicator.connected { opacity: 1; }
        .reload-indicator.disconnected { background: #f85149; opacity: 1; }
    </style>
</head>
<body>
    <div class="reload-indicator" id="indicator"></div>
    <div class="header">
        <h1>{{.Title}}</h1>
        <div class="path">{{.FilePath}}</div>
    </div>
    <div class="container">
        <article class="markdown-body" id="content">{{.Content}}</article>
    </div>
    <script>
    (function() {
        const filePath = {{.FilePath}};
        const indicator = document.getElementById('indicator');
        const content = document.getElementById('content');
        let es;

        function connect() {
            es = new EventSource('/events' + filePath);
            es.onopen = function() {
                indicator.className = 'reload-indicator connected';
            };
            es.addEventListener('update', function(e) {
                content.innerHTML = e.data;
                indicator.className = 'reload-indicator connected';
                setTimeout(function() { indicator.className = 'reload-indicator'; }, 1000);
            });
            es.onerror = function() {
                indicator.className = 'reload-indicator disconnected';
                es.close();
                setTimeout(connect, 3000);
            };
        }
        connect();
    })();
    </script>
</body>
</html>
